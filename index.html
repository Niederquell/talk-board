<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Talk Board</title>
<style>
  :root{
    --bg:#000; --key:#161616; --key2:#333; --border:#5a5a5a;
    --text:#fff; --muted:#cfcfcf; --accent:#ffd400; --del:#ff7a00; --flash:#222;
    --letter:13vw;
  }
  body.light{
    --bg:#ffffff; --key:#eeeeee; --key2:#d6d6d6; --border:#8a8a8a;
    --text:#000; --muted:#555; --accent:#f5c400; --del:#ff7a00; --flash:#e6e6e6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden; touch-action:manipulation; user-select:none; -webkit-user-select:none;}
  body{display:flex; flex-direction:column; height:100dvh;}

  /* Display bar */
  #display{flex:0 0 auto; min-height:16vh; max-height:30vh; display:flex; align-items:center;
    justify-content:center; text-align:center; padding:10px 14px; background:var(--bg);
    border-bottom:3px solid var(--border); font-weight:900; font-size:9vw; line-height:1.05;
    overflow-y:auto; word-break:break-word; color:var(--text);}
  #display.flash{animation:flash .25s ease;}
  @keyframes flash{0%{background:var(--flash);}100%{background:var(--bg);}}
  #display .hint{color:var(--muted); font-weight:700; font-size:5vw;}

  /* Hamburger settings button (sits in the mode row) */
  .mode.menu{flex:0 0 auto; width:15vw; max-width:74px; font-size:7vw; padding:14px 0;}

  /* Settings overlay */
  #settings{position:fixed; inset:0; z-index:100; display:none; padding:20px;
    background:rgba(0,0,0,.75); align-items:center; justify-content:center;}
  #settings.open{display:flex;}
  #settingsPanel{width:100%; max-width:440px; background:var(--key); border:2px solid var(--border);
    border-radius:18px; padding:18px; display:flex; flex-direction:column; gap:14px; color:var(--text);}
  #settingsPanel h2{margin:0 0 4px; font-size:6vw; text-align:center;}
  .setLabel{color:var(--muted); font-size:4vw; font-weight:700;}
  .setRow{display:flex; gap:10px;}
  .setRow button{flex:1; padding:18px; border:2px solid var(--border); border-radius:12px;
    background:var(--bg); color:var(--text); font-size:4.8vw; font-weight:800;}
  .setRow button.sel{background:var(--accent); color:#000; border-color:var(--accent);}
  #settingsPanel select{width:100%; padding:14px; border:2px solid var(--border); border-radius:12px;
    background:var(--bg); color:var(--text); font-size:4.4vw; font-weight:700;}
  #settingsPanel input[type=range]{width:100%; height:44px; accent-color:var(--accent);}
  #settings .close{padding:18px; border:none; border-radius:12px; background:var(--accent);
    color:#000; font-size:5.2vw; font-weight:900; margin-top:6px;}

  /* Big DELETE bar at top */
  #topback{flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:12px;
    width:100%; height:7vh; min-height:46px; padding:0; border:none; border-bottom:3px solid #000;
    background:var(--del); color:#000; font-size:6vw; font-weight:900; line-height:1;}
  #topback:active{background:#ffa040;}
  #topback .lbl{font-size:4.2vw; font-weight:900; letter-spacing:2px;}

  /* Mode toggle */
  #modes{flex:0 0 auto; display:flex; gap:6px; padding:6px; background:var(--bg);}
  .mode{flex:1; padding:14px 6px; border:2px solid var(--border); border-radius:12px; background:var(--bg);
    color:var(--text); font-size:5vw; font-weight:900;}
  .mode.active{background:var(--accent); color:#000; border-color:var(--accent);}

  /* Letter keyboard */
  #letters{flex:1 1 auto; min-height:0; overflow-y:auto; display:grid;
    grid-template-columns:repeat(4,1fr); gap:6px; padding:6px; align-content:stretch;}
  .lk{display:flex; align-items:center; justify-content:center; border:2px solid var(--border);
    border-radius:14px; background:var(--key); color:var(--text); font-size:var(--letter); font-weight:900;
    line-height:1;}
  .lk:active{transform:scale(.93); background:var(--key2);}
  .lk.fn{font-size:4.6vw; background:var(--bg); font-weight:800;}
  .lk.span2{grid-column:span 2;}
  .lk.span4{grid-column:span 4;}

  /* Phrase boards */
  #phrases{display:none; flex:1 1 auto; flex-direction:column; overflow:hidden;}
  #tabs{flex:0 0 auto; display:flex; gap:6px; padding:6px; overflow-x:auto; background:var(--bg);}
  .tab{flex:1 0 auto; min-width:22vw; padding:14px 6px; border:2px solid var(--border); border-radius:12px;
    background:var(--bg); color:var(--text); font-size:4.6vw; font-weight:800;}
  .tab.active{background:var(--accent); color:#000; border-color:var(--accent);}
  #grid{flex:1 1 auto; display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:8px;
    overflow-y:auto; align-content:start;}
  .tile{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    min-height:18vh; border:2px solid var(--border); border-radius:16px; background:var(--key);
    color:var(--text); font-size:6vw; font-weight:900; line-height:1.05; padding:8px; text-align:center;}
  .tile:active{transform:scale(.95); background:var(--key2);}
  .tile .emoji{font-size:11vw; line-height:1;}
  .tile.wide{grid-column:span 2;}

  /* Footer */
  #foot{flex:0 0 auto; display:flex; gap:6px; padding:6px; padding-bottom:calc(6px + env(safe-area-inset-bottom)); background:#000;}
  #foot button{flex:1; padding:16px 4px; border:2px solid var(--border); border-radius:12px;
    background:#000; color:var(--text); font-size:4.4vw; font-weight:800;}
  #foot button:active{background:var(--key2);}
</style>
</head>
<body>

<div id="display" onclick="speakTyped()"><span class="hint">Tap letters to spell</span></div>

<div id="modes">
  <button class="mode menu" id="mMenu" onclick="openSettings()">☰</button>
  <button class="mode active" id="mLetters" onclick="setMode('letters')">LETTERS</button>
  <button class="mode" id="mPhrases" onclick="setMode('phrases')">PHRASES</button>
</div>

<button id="topback" onclick="delChar()">⌫<span class="lbl">DELETE</span></button>

<div id="settings" onclick="if(event.target===this)closeSettings()">
  <div id="settingsPanel">
    <h2>Settings</h2>
    <div class="setLabel">Appearance</div>
    <div class="setRow">
      <button id="setDark" onclick="setTheme('dark')">🌙 Dark</button>
      <button id="setLight" onclick="setTheme('light')">☀️ Light</button>
    </div>
    <div class="setLabel">Speech (read aloud)</div>
    <div class="setRow">
      <button id="setSpeechOff" onclick="setSpeech(false)">🔇 Off</button>
      <button id="setSpeechOn" onclick="setSpeech(true)">🔊 On</button>
    </div>
    <div class="setLabel">Voice</div>
    <select id="setVoice" onchange="setVoice(this.value)"></select>
    <div class="setLabel">Read speed (slower ← → faster)</div>
    <input id="setRate" type="range" min="0.3" max="1.2" step="0.05" onchange="setRate(this.value)">
    <button class="close" onclick="closeSettings()">Done</button>
  </div>
</div>

<div id="letters"></div>

<div id="phrases">
  <div id="tabs"></div>
  <div id="grid"></div>
</div>

<script>
/* ---------- Phrase boards ---------- */
const BOARDS = {
  "Quick":[
    {t:"YES",e:"👍",w:false},{t:"NO",e:"👎",w:false},
    {t:"Please come here",e:"🙋",w:true},{t:"I need the nurse",e:"🚨",w:true},
    {t:"Wait a moment",e:"✋"},{t:"Thank you",e:"🙏"},
    {t:"I don't know",e:"🤷"},{t:"Maybe",e:"🤔"},
  ],
  "Needs":[
    {t:"Water",e:"💧"},{t:"I'm thirsty",e:"🥤"},{t:"I'm hungry",e:"🍽️"},{t:"Bathroom",e:"🚻"},
    {t:"I'm in pain",e:"😣"},{t:"Medicine",e:"💊"},{t:"Too hot",e:"🥵"},{t:"Too cold",e:"🥶"},
    {t:"Fix my pillow",e:"🛏️"},{t:"Sit me up",e:"⬆️"},{t:"Lay me down",e:"⬇️"},{t:"Turn me",e:"🔄"},
    {t:"I'm tired",e:"😴"},{t:"My glasses",e:"👓"},{t:"Turn on the TV",e:"📺"},{t:"Open the blinds",e:"🌤️"},
  ],
  "Feel":[
    {t:"I'm okay",e:"🙂"},{t:"I'm uncomfortable",e:"😖"},{t:"I'm scared",e:"😨"},{t:"I'm frustrated",e:"😤"},
    {t:"I feel sick",e:"🤢"},{t:"I can't breathe",e:"😮‍💨"},{t:"I'm dizzy",e:"💫"},{t:"It hurts here",e:"📍"},
    {t:"Itchy",e:"🖐️"},{t:"Better now",e:"👌"},{t:"Worse",e:"📉"},{t:"I'm happy",e:"😄"},
  ],
  "People":[
    {t:"I love you",e:"❤️",w:true},{t:"Come closer",e:"🤗"},{t:"Hold my hand",e:"🤝"},{t:"Stay with me",e:"💛",w:true},
    {t:"Call my family",e:"📞"},{t:"I want to rest",e:"🤫"},{t:"Where is everyone?",e:"❓"},{t:"Goodbye",e:"👋"},
  ],
};

/* ---------- State ---------- */
let sizeStep=2;                       /* default = largest */
const letterSizes=["9.5vw","11vw","13vw"];
let typed="";
const display=document.getElementById('display');

/* ---------- Display ---------- */
function renderTyped(){
  if(!typed){ display.innerHTML='<span class="hint">Tap letters to spell</span>'; return; }
  display.textContent=typed;
}
function flash(){ display.classList.remove('flash'); void display.offsetWidth; display.classList.add('flash'); }

/* ---------- Letter keyboard ---------- */
const LETTERS="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
function buildLetters(){
  const wrap=document.getElementById('letters'); wrap.innerHTML="";
  LETTERS.forEach(ch=>{
    const b=document.createElement('button'); b.className='lk'; b.textContent=ch;
    b.onclick=()=>typeChar(ch); wrap.appendChild(b);
  });
  const add=(label,cls,fn)=>{ const b=document.createElement('button'); b.className='lk '+cls;
    b.textContent=label; b.onclick=fn; wrap.appendChild(b); };
  add("space","fn span2",()=>typeChar(" "));
}
function typeChar(ch){ typed+=ch; renderTyped(); speakLetter(ch); }
function delChar(){ typed=typed.slice(0,-1); renderTyped(); }
function clearAll(){ typed=""; renderTyped(); }

/* ---------- Phrase boards ---------- */
function buildTabs(){
  const tabs=document.getElementById('tabs'); tabs.innerHTML="";
  Object.keys(BOARDS).forEach((name,i)=>{
    const b=document.createElement('button'); b.className='tab'+(i===0?' active':'');
    b.textContent=name.toUpperCase(); b.onclick=()=>{ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      b.classList.add('active'); renderBoard(name); }; tabs.appendChild(b);
  });
}
function renderBoard(name){
  const grid=document.getElementById('grid'); grid.innerHTML="";
  BOARDS[name].forEach(it=>{
    const b=document.createElement('button');
    b.className='tile';
    b.innerHTML=`<span class="emoji">${it.e||''}</span><span>${it.t}</span>`;
    b.onclick=()=>{ display.textContent=it.t; flash(); speak(it.t.toLowerCase(),0.92); };
    grid.appendChild(b);
  });
}

/* ---------- Modes ---------- */
function setMode(m){
  const isL=m==='letters';
  document.getElementById('letters').style.display=isL?'grid':'none';
  document.getElementById('phrases').style.display=isL?'none':'flex';
  document.getElementById('mLetters').classList.toggle('active',isL);
  document.getElementById('mPhrases').classList.toggle('active',!isL);
  document.getElementById('topback').style.display=isL?'flex':'none';
  if(isL) renderTyped();
}

/* ---------- Footer ---------- */
function cycleSize(){ sizeStep=(sizeStep+1)%letterSizes.length;
  document.documentElement.style.setProperty('--letter',letterSizes[sizeStep]); }

/* ---------- Theme + settings ---------- */
function applyTheme(t){
  document.body.classList.toggle('light', t==='light');
  const m=document.querySelector('meta[name=theme-color]'); if(m) m.content = t==='light' ? '#ffffff' : '#000000';
  const d=document.getElementById('setDark'), l=document.getElementById('setLight');
  if(d&&l){ d.classList.toggle('sel', t!=='light'); l.classList.toggle('sel', t==='light'); }
}
let theme = (localStorage.getItem('theme')==='light') ? 'light' : 'dark';
function setTheme(t){ theme=t; localStorage.setItem('theme',t); applyTheme(t); }
function openSettings(){ document.getElementById('settings').classList.add('open'); }
function closeSettings(){ document.getElementById('settings').classList.remove('open'); }

/* ---------- Speech (text-to-speech) — optional, for blind/low-vision users ---------- */
const TTS = ('speechSynthesis' in window);
const DEFAULT_RATE = 0.8;          /* 20% slower than normal speech */
const LETTER_RATE  = 0.95;
const SETTINGS_V   = '3';          /* bump to push new voice/speed defaults to existing devices */

/* one-time migration: reset to the new curated defaults once */
if(localStorage.getItem('settingsV')!==SETTINGS_V){
  localStorage.removeItem('rate'); localStorage.removeItem('voiceName');
  localStorage.setItem('settingsV', SETTINGS_V);
}

let speech = localStorage.getItem('speech')==='1';
let voices=[];
let voiceName = localStorage.getItem('voiceName') || '';
let rate = parseFloat(localStorage.getItem('rate')); if(!(rate>0)) rate=DEFAULT_RATE;

/* Apple/Google expose many robotic + novelty voices — hide them, keep real human ones. */
const NOVELTY = /albert|bad news|bahh|bells|boing|bubbles|cellos|good news|jester|organ|pipe|superstar|trinoids|whisper|wobble|zarvox|deranged|hysterical|princess|junior|ralph|fred|kathy|grandma|grandpa|eddy|flo|reed|rocko|sandy|shelley|googlebot/i;
/* preferred natural-sounding human voices, best first */
const PREF = ['samantha','ava','allison','alex','tom','evan','nathan','susan','zoe','joelle','nicky','aaron','daniel','karen','moira','tessa','serena','arthur','martha','stephanie','matilda','oliver','gordon','catherine'];
function voiceScore(v){
  const n=(v.name||'').toLowerCase(); let s=0;
  if(/siri/.test(n)) s+=200;
  if(/(enhanced|premium|natural|neural)/.test(n)) s+=100;
  const i=PREF.findIndex(p=>n.includes(p)); if(i>=0) s += (PREF.length - i);
  return s;
}
function loadVoices(){
  if(!TTS) return;
  const all=speechSynthesis.getVoices();
  let en=all.filter(v=>v.lang && v.lang.toLowerCase().startsWith('en'));
  let good=en.filter(v=>!NOVELTY.test(v.name||''));
  if(!good.length) good = en.length ? en : all;
  good.sort((a,b)=>voiceScore(b)-voiceScore(a));
  voices=good;
  if(!voiceName || !voices.find(v=>v.name===voiceName)) voiceName = voices[0] ? voices[0].name : '';
  buildVoiceOptions();
}
if(TTS){ speechSynthesis.onvoiceschanged=loadVoices; loadVoices(); }

function speak(text, r){
  if(!speech || !TTS || !text) return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);
    const v = voices.find(x=>x.name===voiceName) || voices[0];
    if(v) u.voice=v; u.rate=r||rate; u.pitch=1; u.volume=1; speechSynthesis.speak(u);
  }catch(e){}
}
function speakLetter(ch){ if(ch===' ') return; speak(ch.toLowerCase(), LETTER_RATE); }
function speakTyped(){ if(typed.trim()) speak(typed.trim().toLowerCase()); }

function buildVoiceOptions(){
  const sel=document.getElementById('setVoice'); if(!sel) return;
  sel.innerHTML='';
  voices.forEach(v=>{ const o=document.createElement('option'); o.value=v.name;
    o.textContent=v.name.replace(/\(.*?\)/g,'').trim()+(v.lang?(' · '+v.lang):'');
    if(v.name===voiceName) o.selected=true; sel.appendChild(o); });
}
function setVoice(name){ voiceName=name; localStorage.setItem('voiceName',name); speak('Hello'); }
function setRate(v){ rate=parseFloat(v); localStorage.setItem('rate', rate); speak('This is the speed'); }

function updateSpeechBtns(){
  const on=document.getElementById('setSpeechOn'), off=document.getElementById('setSpeechOff');
  if(on&&off){ on.classList.toggle('sel',speech); off.classList.toggle('sel',!speech); }
  const rs=document.getElementById('setRate'); if(rs) rs.value=rate;
  buildVoiceOptions();
}
function setSpeech(v){ speech=v; localStorage.setItem('speech', v?'1':'0'); updateSpeechBtns(); if(v) speak('Speech on'); }

/* ---------- Keep screen awake ---------- */
let wakeLock=null;
async function keepAwake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') keepAwake(); });

/* ---------- Init ---------- */
document.documentElement.style.setProperty('--letter',letterSizes[sizeStep]);
buildLetters(); buildTabs(); renderBoard(Object.keys(BOARDS)[0]);
renderTyped();
applyTheme(theme); updateSpeechBtns();
document.body.addEventListener('pointerdown',()=>keepAwake(),{once:true});

/* ---------- Auto-update: reload when a new version takes over ---------- */
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing) return; refreshing=true; window.location.reload();
  });
  navigator.serviceWorker.register('sw.js').then(reg=>{ reg.update(); })
    .catch(()=>{});
  /* check for updates whenever the board is reopened */
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible')
      navigator.serviceWorker.getRegistration().then(r=>{ if(r) r.update(); });
  });
}
</script>
</body>
</html>
