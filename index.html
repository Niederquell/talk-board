<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Talk Board</title>
<style>
  :root{
    --bg:#000; --key:#161616; --key2:#333; --border:#5a5a5a;
    --text:#fff; --muted:#cfcfcf; --accent:#ffd400; --del:#ff7a00;
    --letter:13vw;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden; touch-action:manipulation; user-select:none; -webkit-user-select:none;}
  body{display:flex; flex-direction:column; height:100dvh;}

  /* Display bar */
  #display{flex:0 0 auto; min-height:16vh; max-height:30vh; display:flex; align-items:center;
    justify-content:center; text-align:center; padding:10px 14px; background:#000;
    border-bottom:3px solid var(--border); font-weight:900; font-size:9vw; line-height:1.05;
    overflow-y:auto; word-break:break-word; color:#fff;}
  #display.flash{animation:flash .25s ease;}
  @keyframes flash{0%{background:#222;}100%{background:#000;}}
  #display .hint{color:var(--muted); font-weight:700; font-size:5vw;}

  /* Big DELETE bar at top */
  #topback{flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:16px;
    width:100%; min-height:13vh; border:none; border-bottom:3px solid #000; background:var(--del);
    color:#000; font-size:10vw; font-weight:900; line-height:1;}
  #topback:active{background:#ffa040;}
  #topback .lbl{font-size:5vw; font-weight:900; letter-spacing:2px;}

  /* Mode toggle */
  #modes{flex:0 0 auto; display:flex; gap:6px; padding:6px; background:#000;}
  .mode{flex:1; padding:14px 6px; border:2px solid var(--border); border-radius:12px; background:#000;
    color:var(--text); font-size:5vw; font-weight:900;}
  .mode.active{background:var(--accent); color:#000; border-color:var(--accent);}

  /* Letter keyboard */
  #letters{flex:1 1 auto; display:grid; grid-template-columns:repeat(4,1fr); gap:6px;
    padding:6px; align-content:stretch;}
  .lk{display:flex; align-items:center; justify-content:center; border:2px solid var(--border);
    border-radius:14px; background:var(--key); color:#fff; font-size:var(--letter); font-weight:900;
    line-height:1;}
  .lk:active{transform:scale(.93); background:var(--key2);}
  .lk.fn{font-size:4.6vw; background:#000; font-weight:800;}
  .lk.span2{grid-column:span 2;}
  .lk.span4{grid-column:span 4;}

  /* Phrase boards */
  #phrases{display:none; flex:1 1 auto; flex-direction:column; overflow:hidden;}
  #tabs{flex:0 0 auto; display:flex; gap:6px; padding:6px; overflow-x:auto; background:#000;}
  .tab{flex:1 0 auto; min-width:22vw; padding:14px 6px; border:2px solid var(--border); border-radius:12px;
    background:#000; color:var(--text); font-size:4.6vw; font-weight:800;}
  .tab.active{background:var(--accent); color:#000; border-color:var(--accent);}
  #grid{flex:1 1 auto; display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:8px;
    overflow-y:auto; align-content:start;}
  .tile{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    min-height:18vh; border:2px solid var(--border); border-radius:16px; background:var(--key);
    color:#fff; font-size:6vw; font-weight:900; line-height:1.05; padding:8px; text-align:center;}
  .tile:active{transform:scale(.95); background:var(--key2);}
  .tile .emoji{font-size:11vw; line-height:1;}
  .tile.wide{grid-column:span 2;}

  /* Footer */
  #foot{flex:0 0 auto; display:flex; gap:6px; padding:6px; background:#000;}
  #foot button{flex:1; padding:16px 4px; border:2px solid var(--border); border-radius:12px;
    background:#000; color:var(--text); font-size:4.4vw; font-weight:800;}
  #foot button:active{background:var(--key2);}
</style>
</head>
<body>

<div id="display"><span class="hint">Tap letters to spell</span></div>

<button id="topback" onclick="delChar()">⌫<span class="lbl">DELETE</span></button>

<div id="modes">
  <button class="mode active" id="mLetters" onclick="setMode('letters')">LETTERS</button>
  <button class="mode" id="mPhrases" onclick="setMode('phrases')">PHRASES</button>
</div>

<div id="letters"></div>

<div id="phrases">
  <div id="tabs"></div>
  <div id="grid"></div>
</div>

<div id="foot">
  <button onclick="clearAll()">🧹 CLEAR ALL</button>
  <button onclick="cycleSize()">🔡 SIZE</button>
</div>

<script>
/* ---------- Phrase boards ---------- */
const BOARDS = {
  "Quick":[
    {t:"YES",e:"👍",w:false},{t:"NO",e:"👎",w:false},
    {t:"Please come here",e:"🙋",w:true},{t:"I need the nurse",e:"🚨",w:true},
    {t:"Wait a moment",e:"✋"},{t:"Thank you",e:"🙏"},
    {t:"I don't know",e:"🤷"},{t:"Maybe",e:"🤔"},
  ],
  "Needs":[
    {t:"Water",e:"💧"},{t:"I'm thirsty",e:"🥤"},{t:"I'm hungry",e:"🍽️"},{t:"Bathroom",e:"🚻"},
    {t:"I'm in pain",e:"😣"},{t:"Medicine",e:"💊"},{t:"Too hot",e:"🥵"},{t:"Too cold",e:"🥶"},
    {t:"Fix my pillow",e:"🛏️"},{t:"Sit me up",e:"⬆️"},{t:"Lay me down",e:"⬇️"},{t:"Turn me",e:"🔄"},
    {t:"I'm tired",e:"😴"},{t:"My glasses",e:"👓"},{t:"Turn on the TV",e:"📺"},{t:"Open the blinds",e:"🌤️"},
  ],
  "Feel":[
    {t:"I'm okay",e:"🙂"},{t:"I'm uncomfortable",e:"😖"},{t:"I'm scared",e:"😨"},{t:"I'm frustrated",e:"😤"},
    {t:"I feel sick",e:"🤢"},{t:"I can't breathe",e:"😮‍💨"},{t:"I'm dizzy",e:"💫"},{t:"It hurts here",e:"📍"},
    {t:"Itchy",e:"🖐️"},{t:"Better now",e:"👌"},{t:"Worse",e:"📉"},{t:"I'm happy",e:"😄"},
  ],
  "People":[
    {t:"I love you",e:"❤️",w:true},{t:"Come closer",e:"🤗"},{t:"Hold my hand",e:"🤝"},{t:"Stay with me",e:"💛",w:true},
    {t:"Call my family",e:"📞"},{t:"I want to rest",e:"🤫"},{t:"Where is everyone?",e:"❓"},{t:"Goodbye",e:"👋"},
  ],
};

/* ---------- State ---------- */
let sizeStep=2;                       /* default = largest */
const letterSizes=["9.5vw","11vw","13vw"];
let typed="";
const display=document.getElementById('display');

/* ---------- Display ---------- */
function renderTyped(){
  if(!typed){ display.innerHTML='<span class="hint">Tap letters to spell</span>'; return; }
  display.textContent=typed;
}
function flash(){ display.classList.remove('flash'); void display.offsetWidth; display.classList.add('flash'); }

/* ---------- Letter keyboard ---------- */
const LETTERS="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
function buildLetters(){
  const wrap=document.getElementById('letters'); wrap.innerHTML="";
  LETTERS.forEach(ch=>{
    const b=document.createElement('button'); b.className='lk'; b.textContent=ch;
    b.onclick=()=>typeChar(ch); wrap.appendChild(b);
  });
  const add=(label,cls,fn)=>{ const b=document.createElement('button'); b.className='lk '+cls;
    b.textContent=label; b.onclick=fn; wrap.appendChild(b); };
  add("space","fn span2",()=>typeChar(" "));
  add("clear","fn span4",clearAll);
}
function typeChar(ch){ typed+=ch; renderTyped(); }
function delChar(){ typed=typed.slice(0,-1); renderTyped(); }
function clearAll(){ typed=""; renderTyped(); }

/* ---------- Phrase boards ---------- */
function buildTabs(){
  const tabs=document.getElementById('tabs'); tabs.innerHTML="";
  Object.keys(BOARDS).forEach((name,i)=>{
    const b=document.createElement('button'); b.className='tab'+(i===0?' active':'');
    b.textContent=name.toUpperCase(); b.onclick=()=>{ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      b.classList.add('active'); renderBoard(name); }; tabs.appendChild(b);
  });
}
function renderBoard(name){
  const grid=document.getElementById('grid'); grid.innerHTML="";
  BOARDS[name].forEach(it=>{
    const b=document.createElement('button');
    b.className='tile'+(it.w?' wide':'');
    b.innerHTML=`<span class="emoji">${it.e||''}</span><span>${it.t}</span>`;
    b.onclick=()=>{ display.textContent=it.t; flash(); };
    grid.appendChild(b);
  });
}

/* ---------- Modes ---------- */
function setMode(m){
  const isL=m==='letters';
  document.getElementById('letters').style.display=isL?'grid':'none';
  document.getElementById('phrases').style.display=isL?'none':'flex';
  document.getElementById('mLetters').classList.toggle('active',isL);
  document.getElementById('mPhrases').classList.toggle('active',!isL);
  document.getElementById('topback').style.display=isL?'flex':'none';
  if(isL) renderTyped();
}

/* ---------- Footer ---------- */
function cycleSize(){ sizeStep=(sizeStep+1)%letterSizes.length;
  document.documentElement.style.setProperty('--letter',letterSizes[sizeStep]); }

/* ---------- Keep screen awake ---------- */
let wakeLock=null;
async function keepAwake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') keepAwake(); });

/* ---------- Init ---------- */
document.documentElement.style.setProperty('--letter',letterSizes[sizeStep]);
buildLetters(); buildTabs(); renderBoard(Object.keys(BOARDS)[0]);
renderTyped();
document.body.addEventListener('pointerdown',()=>keepAwake(),{once:true});
</script>
</body>
</html>
